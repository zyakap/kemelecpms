upstream kemelecpms_app {
    server unix:/run/gunicorn/kemelecpms.sock fail_timeout=0;
}

# Redirect HTTP to HTTPS
server {
    listen 80;
    server_name cpms.kemeleconstruction.com.pg www.cpms.kemeleconstruction.com.pg;

    location /.well-known/acme-challenge/ {
        root /var/www/certbot;
    }

    location / {
        return 301 https://$host$request_uri;
    }
}

# Main HTTPS server
server {
    listen 443 ssl http2;
    server_name cpms.kemeleconstruction.com.pg www.cpms.kemeleconstruction.com.pg;

    ssl_certificate     /etc/letsencrypt/live/cpms.kemeleconstruction.com.pg/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/cpms.kemeleconstruction.com.pg/privkey.pem;

    ssl_protocols TLSv1.2 TLSv1.3;
    ssl_ciphers ECDHE-ECDSA-AES128-GCM-SHA256:ECDHE-RSA-AES128-GCM-SHA256:ECDHE-ECDSA-AES256-GCM-SHA384:ECDHE-RSA-AES256-GCM-SHA384;
    ssl_prefer_server_ciphers off;
    ssl_session_cache shared:SSL:10m;
    ssl_session_timeout 1d;
    ssl_session_tickets off;
    ssl_stapling on;
    ssl_stapling_verify on;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains; preload" always;
    add_header X-Frame-Options DENY always;
    add_header X-Content-Type-Options nosniff always;
    add_header X-XSS-Protection "1; mode=block" always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;

    client_max_body_size 55M;

    access_log /var/log/nginx/kemelecpms_access.log;
    error_log  /var/log/nginx/kemelecpms_error.log warn;

    # Static files
    location /static/ {
        alias /home/kemelecpms/staticfiles/;
        expires 30d;
        add_header Cache-Control "public, immutable";
        gzip_static on;
    }

    # Media files
    location /media/ {
        alias /home/kemelecpms/media/;
        expires 7d;
        add_header Cache-Control "public";
        # Restrict direct access to sensitive documents
        location ~* \.(py|php|sh|pl|rb)$ {
            deny all;
        }
    }

    # Favicon
    location = /favicon.ico {
        alias /home/kemelecpms/staticfiles/images/favicon.ico;
        log_not_found off;
        access_log off;
    }

    # Robots
    location = /robots.txt {
        return 200 "User-agent: *\nDisallow: /\n";
        log_not_found off;
        access_log off;
    }

    # Django application
    location / {
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
        proxy_set_header Host $http_host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_redirect off;

        proxy_connect_timeout 60s;
        proxy_read_timeout 120s;
        proxy_send_timeout 120s;

        proxy_pass http://kemelecpms_app;
    }
}
