{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}{{ form_title }}{% endblock %}
{% block active_projects %}active{% endblock %}
{% block content %}
{% include "partials/breadcrumb.html" %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-semibold" style="color:var(--kc-primary)">{{ form_title }}</div>
      <div class="card-body">
        <form method="post">{% csrf_token %}{{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button class="btn btn-primary" type="submit">Save</button>
            <a href="{{ project.get_absolute_url }}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
