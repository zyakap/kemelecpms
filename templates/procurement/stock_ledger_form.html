{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Stock Movement{% endblock %}
{% block active_nav %}procurement{% endblock %}
{% block content %}
<div class="row justify-content-center">
  <div class="col-lg-7">
    <div class="card border-0 shadow-sm">
      <div class="card-header bg-white fw-semibold" style="color:var(--kc-primary)">Record Stock Movement</div>
      <div class="card-body">
        <form method="post">{% csrf_token %}{{ form|crispy }}
          <div class="d-flex gap-2 mt-3">
            <button type="submit" class="btn btn-primary">Save</button>
            <a href="{% url 'procurement:stock_ledger' %}" class="btn btn-outline-secondary">Cancel</a>
          </div>
        </form>
      </div>
    </div>
  </div>
</div>
{% endblock %}
