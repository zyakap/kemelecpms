{% extends "base.html" %}
{% load crispy_forms_tags %}
{% block title %}Compliance Template{% endblock %}
{% block active_nav %}compliance{% endblock %}
{% block content %}
<div class="row justify-content-center"><div class="col-lg-8"><section class="content-card"><div class="cc-header"><h5>Compliance Calendar Template</h5></div><div class="cc-body"><form method="post">{% csrf_token %}{{ form|crispy }}<div class="d-flex gap-2 mt-3"><button class="btn btn-primary" type="submit"><i class="bi bi-save me-1"></i>Save</button><a href="{% url 'compliance:calendar-template-list' %}" class="btn btn-outline-secondary">Cancel</a></div></form></div></section></div></div>
{% endblock %}
